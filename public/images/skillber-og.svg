<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#ffffff">
    <line x1="0" y1="105" x2="1200" y2="105" stroke-width="0.5"/>
    <line x1="0" y1="210" x2="1200" y2="210" stroke-width="0.5"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke-width="0.5"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke-width="0.5"/>
    <line x1="0" y1="525" x2="1200" y2="525" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke-width="0.5"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="950" cy="150" r="200" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.15"/>
  <circle cx="1000" cy="100" r="120" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.1"/>
  <circle cx="200" cy="500" r="160" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.12"/>
  <circle cx="150" cy="550" r="80" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.08"/>

  <!-- Slashes icon (brand mark) -->
  <g transform="translate(600, 130)" filter="url(#glow)">
    <line x1="-6" y1="-50" x2="-36" y2="50" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
    <line x1="6" y1="-50" x2="-24" y2="50" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="600" y="270" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" letter-spacing="2">
    Skillber
  </text>

  <!-- Tagline -->
  <text x="600" y="330" text-anchor="middle" fill="#a78bfa" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="500" letter-spacing="4" opacity="0.9">
    BUILD IN-DEMAND TECH SKILLS
  </text>

  <!-- Divider line -->
  <line x1="450" y1="365" x2="750" y2="365" stroke="url(#accent2)" stroke-width="2" opacity="0.6"/>

  <!-- Course categories -->
  <g transform="translate(600, 420)">
    <text x="0" y="0" text-anchor="middle" fill="#9ca3af" font-family="system-ui, -apple-system, sans-serif" font-size="16" letter-spacing="2" opacity="0.8">
      CYBERSECURITY  ·  CLOUD ENGINEERING  ·  FULL STACK  ·  DATA SCIENCE  ·  DEVOPS
    </text>
    <text x="0" y="28" text-anchor="middle" fill="#9ca3af" font-family="system-ui, -apple-system, sans-serif" font-size="16" letter-spacing="2" opacity="0.8">
      IAM &amp; PAM  ·  MOBILE  ·  PYTHON  ·  EHR MANAGEMENT
    </text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="350" y="530" width="500" height="3" rx="1.5" fill="url(#accent)" opacity="0.4"/>
</svg>
